name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w" -o notion-sync-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/notion-sync

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: notion-sync-${{ matrix.goos }}-${{ matrix.goarch }}
          path: notion-sync-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"* release/
          done
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Scoop manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(grep 'notion-sync-windows-amd64.exe' release/checksums.txt | awk '{print $1}')

          jq \
            --arg ver "$VERSION" \
            --arg hash "$SHA256" \
            '.version = $ver | .architecture."64bit".url = "https://github.com/ran-codes/notion-sync/releases/download/v\($ver)/notion-sync-windows-amd64.exe" | .architecture."64bit".hash = $hash' \
            bucket/notion-sync.json > bucket/notion-sync.json.tmp

          mv bucket/notion-sync.json.tmp bucket/notion-sync.json

      - name: Commit updated Scoop manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add bucket/notion-sync.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "scoop: update manifest to v${GITHUB_REF_NAME#v}"
          git push origin main
